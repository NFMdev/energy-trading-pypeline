services:
  postgres:
    image: postgres:18
    container_name: energy-pipeline-postgres
    environment:
      POSTGRES_DB: energy_pipeline
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_energy_market_tables.sql:/docker-entrypoint-initdb.d/001_create_energy_market_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d energy_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: energy-pipeline-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://localhost:9092"
    ports:
      - "9092:9092"
      - "9644:9644"

volumes:
  postgres_data: