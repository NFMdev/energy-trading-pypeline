services:
  postgres:
    image: postgres:18
    container_name: energy-pipeline-postgres
    environment:
      POSTGRES_DB: energy_pipeline
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations/001_create_energy_market_tables.sql:/docker-entrypoint-initdb.d/001_create_energy_market_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d energy_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v26.1.7
    container_name: energy-pipeline-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://localhost:9092"
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:latest
    container_name: energy-pipeline-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

volumes:
  postgres_data: